<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合诉讼维权中心周报 | {{week_date}}</title>
    <style>
        /* 邮件兼容版 - 使用固定值替代CSS变量 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            color: #262626;
            line-height: 1.6;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        /* 容器 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
        }

        /* 头部区域 */
        .header {
            background: #2563eb;
            border-radius: 16px;
            padding: 32px 24px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .header-title {
            font-size: 28px;
            font-weight: 600;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header-date {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 400;
        }

        /* 数据卡片区域 - 使用table布局确保兼容性 */
        .metrics-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 16px;
            margin-bottom: 16px;
        }

        .metric-cell {
            width: 25%;
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #e5e5e5;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03);
        }

        .metric-label {
            font-size: 11px;
            font-weight: 500;
            color: #737373;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 36px;
            font-weight: 600;
            color: #171717;
            line-height: 1;
            margin-bottom: 8px;
        }

        .metric-desc {
            font-size: 12px;
            color: #a3a3a3;
        }

        /* 章节区域 */
        .section {
            background: #ffffff;
            border-radius: 10px;
            margin-bottom: 16px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03);
            border: 1px solid #e5e5e5;
            overflow: hidden;
        }

        .section-header {
            padding: 20px 24px;
            background: #eff6ff;
            border-bottom: 1px solid #e5e5e5;
        }

        .section-number {
            display: inline-block;
            width: 36px;
            height: 36px;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            text-align: center;
            line-height: 36px;
            font-size: 14px;
            font-weight: 600;
            margin-right: 12px;
            vertical-align: middle;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #171717;
            display: inline-block;
            vertical-align: middle;
        }

        .section-body {
            padding: 20px 24px;
        }

        /* 数据概览区域 */
        .data-overview {
            background: #fafafa;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e5e5e5;
        }

        .overview-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 8px;
        }

        .overview-cell {
            width: 25%;
            text-align: center;
            padding: 12px 8px;
            background: #ffffff;
            border-radius: 6px;
            border: 1px solid #e5e5e5;
        }

        .overview-value {
            font-size: 22px;
            font-weight: 700;
            color: #2563eb;
            line-height: 1;
        }

        .overview-label {
            font-size: 10px;
            color: #737373;
            margin-top: 4px;
        }

        /* 细分分布 */
        .breakdown-box {
            margin-top: 8px;
            padding: 8px;
            background: #ffffff;
            border-radius: 6px;
            border: 1px solid #e5e5e5;
        }

        .breakdown-header {
            font-size: 10px;
            color: #a3a3a3;
            margin-bottom: 8px;
            text-align: center;
        }

        .breakdown-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 8px;
        }

        .breakdown-cell {
            width: 25%;
            text-align: center;
            padding: 8px 4px;
            background: #fafafa;
            border-radius: 6px;
            border: 1px solid #e5e5e5;
        }

        .breakdown-value {
            font-size: 16px;
            font-weight: 700;
            color: #404040;
            line-height: 1;
        }

        .breakdown-label {
            font-size: 10px;
            color: #737373;
            margin-top: 2px;
        }

        /* 竞业限制样式 */
        .nc-secondary-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 8px;
            margin-top: 8px;
        }

        .nc-secondary-cell {
            width: 33.33%;
            text-align: center;
            padding: 4px;
            background: transparent;
            border-radius: 6px;
            border: 1px dashed #d4d4d4;
        }

        .nc-secondary-value {
            font-size: 16px;
            font-weight: 600;
            color: #737373;
            line-height: 1;
        }

        .nc-secondary-label {
            font-size: 10px;
            color: #a3a3a3;
            margin-top: 2px;
        }

        /* BG分布双栏布局 */
        .bg-dist-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 12px;
            margin-top: 8px;
        }

        .bg-dist-cell {
            width: 50%;
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 8px;
            vertical-align: top;
        }

        .bg-dist-header {
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px dashed #e5e5e5;
        }

        .bg-dist-title {
            font-size: 11px;
            font-weight: 600;
            color: #525252;
        }

        .bg-dist-total {
            font-size: 11px;
            font-weight: 700;
            color: #2563eb;
            float: right;
        }

        .bg-grid-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 4px;
        }

        .bg-grid-cell {
            width: 50%;
            padding: 4px 8px;
            background: #fafafa;
            border-radius: 6px;
            font-size: 11px;
        }

        .bg-grid-name {
            color: #737373;
        }

        .bg-grid-value {
            font-weight: 700;
            color: #262626;
            float: right;
        }

        /* 摘要文本 */
        .summary-text {
            font-size: 13px;
            color: #525252;
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .summary-text p {
            margin-bottom: 12px;
        }

        .summary-text a {
            color: #2563eb;
            text-decoration: none;
        }

        /* 案件卡片 */
        .case-list {
            margin-top: 24px;
        }

        .case-card {
            background: #fafafa;
            border-radius: 6px;
            border: 1px solid #e5e5e5;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .case-header {
            padding: 16px 20px;
            background: #eff6ff;
            border-bottom: 1px solid #e5e5e5;
        }

        .case-title {
            font-size: 14px;
            font-weight: 600;
            color: #262626;
            display: inline-block;
            vertical-align: middle;
        }

        .case-badges {
            display: inline-block;
            float: right;
            vertical-align: middle;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 6px;
        }

        .badge:first-child {
            margin-left: 0;
        }

        .badge-primary {
            background: #eff6ff;
            color: #2563eb;
        }

        .badge-status {
            background: #2563eb;
            color: white;
        }

        .avatar {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 4px;
        }

        .owner-name {
            margin-right: 8px;
        }

        .owner-name:last-child {
            margin-right: 0;
        }

        .case-body {
            padding: 16px 20px;
        }

        .case-section {
            margin-bottom: 16px;
        }

        .case-section:last-child {
            margin-bottom: 0;
        }

        .case-section-title {
            font-size: 10px;
            font-weight: 600;
            color: #2563eb;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .case-section-content {
            font-size: 13px;
            color: #525252;
            line-height: 1.8;
        }

        /* 文档链接 */
        .doc-links {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e5e5;
        }

        .doc-link {
            display: inline-block;
            padding: 8px 16px;
            background: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            color: #2563eb;
            text-decoration: none;
            font-size: 13px;
            margin-right: 12px;
            margin-bottom: 8px;
        }

        /* 页脚 */
        .footer {
            background: #ffffff;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03);
            border: 1px solid #e5e5e5;
        }

        .footer-author {
            margin-bottom: 16px;
        }

        .footer-name {
            font-size: 16px;
            font-weight: 600;
            color: #171717;
            margin-bottom: 4px;
        }

        .footer-title {
            font-size: 13px;
            color: #737373;
        }

        .footer-notice {
            padding: 16px;
            background: #eff6ff;
            border-radius: 6px;
            border-left: 3px solid #2563eb;
            font-size: 12px;
            color: #525252;
            line-height: 1.6;
        }

        .footer-notice strong {
            color: #2563eb;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="header-title">综合诉讼维权中心周报</h1>
            <div class="header-date">{{week_date_full}}</div>
        </div>

        <!-- Metrics -->
        <table class="metrics-table">
            <tr>
                <td class="metric-cell">
                    <div class="metric-label">在办案件</div>
                    <div class="metric-value">{{total_cases}}</div>
                    <div class="metric-desc">持续推进</div>
                </td>
                <td class="metric-cell">
                    <div class="metric-label">新增案件</div>
                    <div class="metric-value">{{new_cases}}</div>
                    <div class="metric-desc">本周新增</div>
                </td>
                <td class="metric-cell">
                    <div class="metric-label">结案数量</div>
                    <div class="metric-value">{{closed_cases}}</div>
                    <div class="metric-desc">无新结案</div>
                </td>
                <td class="metric-cell">
                    <div class="metric-label">涉外纠纷</div>
                    <div class="metric-value">{{foreign_cases}}</div>
                    <div class="metric-desc">持续关注</div>
                </td>
            </tr>
        </table>

        {{sections}}

        <!-- Document Links -->
        <div class="section" style="background: #fafafa;">
            <div class="section-body">
                <div style="font-size: 13px; font-weight: 600; color: #171717; margin-bottom: 12px;">附件：</div>
                {{doc_links}}
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-author">
                <div class="footer-name">{{author_name}}</div>
                <div class="footer-title">{{author_title}}</div>
            </div>
            <div class="footer-notice">
                <strong>Notice:</strong> {{notice_text}}
            </div>
        </div>
    </div>
</body>
</html>
