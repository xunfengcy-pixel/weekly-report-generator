name: Build Executables

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit
    
    - name: Build executable
      run: |
        pyinstaller --onefile --name "weekly-report" --add-data "app.py:." --add-data "config.py:." --add-data "template.html:." run_app.py
    
    - name: Create app bundle
      run: |
        APP_NAME="周报生成器"
        APP_DIR="dist/${APP_NAME}.app"
        
        # 创建目录结构
        mkdir -p "${APP_DIR}/Contents/MacOS"
        mkdir -p "${APP_DIR}/Contents/Resources"
        
        # 复制可执行文件
        cp dist/weekly-report "${APP_DIR}/Contents/MacOS/${APP_NAME}"
        chmod +x "${APP_DIR}/Contents/MacOS/${APP_NAME}"
        
        # 创建 Info.plist
        cat > "${APP_DIR}/Contents/Info.plist" << 'PLIST_EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleDevelopmentRegion</key>
    <string>zh_CN</string>
    <key>CFBundleExecutable</key>
    <string>周报生成器</string>
    <key>CFBundleIdentifier</key>
    <string>com.weeklyreport.generator</string>
    <key>CFBundleInfoDictionaryVersion</key>
    <string>6.0</string>
    <key>CFBundleName</key>
    <string>周报生成器</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>LSMinimumSystemVersion</key>
    <string>10.13</string>
    <key>NSHighResolutionCapable</key>
    <true/>
</dict>
</plist>
PLIST_EOF
        
        # 显示结果
        ls -la "${APP_DIR}/Contents/MacOS/"
    
    - name: Zip app bundle
      run: |
        cd dist
        zip -r ../weekly-report-macos.zip "周报生成器.app"
        cd ..
        ls -la weekly-report-macos.zip
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: weekly-report-macos
        path: weekly-report-macos.zip
