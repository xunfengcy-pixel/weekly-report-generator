name: Build Executables

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit
    
    - name: Build executable
      run: |
        pyinstaller --onefile --name "weekly-report" --add-data "app.py:." --add-data "config.py:." --add-data "template.html:." run_app.py
    
    - name: Create app bundle
      run: |
        mkdir -p "dist/周报生成器.app/Contents/MacOS"
        mkdir -p "dist/周报生成器.app/Contents/Resources"
        cp dist/weekly-report "dist/周报生成器.app/Contents/MacOS/周报生成器"
        chmod +x "dist/周报生成器.app/Contents/MacOS/周报生成器"
        
        printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' > "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '<plist version="1.0">' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '<dict>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <key>CFBundleDevelopmentRegion</key>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <string>zh_CN</string>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <key>CFBundleExecutable</key>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <string>周报生成器</string>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <key>CFBundleIdentifier</key>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <string>com.weeklyreport.generator</string>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <key>CFBundleInfoDictionaryVersion</key>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <string>6.0</string>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <key>CFBundleName</key>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <string>周报生成器</string>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <key>CFBundlePackageType</key>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <string>APPL</string>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <key>CFBundleShortVersionString</key>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <string>1.0</string>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <key>CFBundleVersion</key>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <string>1</string>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <key>LSMinimumSystemVersion</key>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <string>10.13</string>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <key>NSHighResolutionCapable</key>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '    <true/>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '</dict>' >> "dist/周报生成器.app/Contents/Info.plist"
        printf '%s\n' '</plist>' >> "dist/周报生成器.app/Contents/Info.plist"
        
        ls -la "dist/周报生成器.app/Contents/MacOS/"
    
    - name: Zip app bundle
      run: |
        cd dist
        zip -r ../weekly-report-macos.zip "周报生成器.app"
        cd ..
        ls -la weekly-report-macos.zip
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: weekly-report-macos
        path: weekly-report-macos.zip
